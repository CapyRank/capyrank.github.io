<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapyRank — Herd Live</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: transparent;
  font-family: 'Nunito', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}

#widget {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
#widget.ready {
  opacity: 1;
  transform: translateY(0);
}

/* Pulsing live dot */
#live-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #4cca6a;
  flex-shrink: 0;
  animation: dot-pulse 2s ease-in-out infinite;
}
#live-dot.offline {
  background: rgba(255,255,255,0.2);
  animation: none;
}

@keyframes dot-pulse {
  0%, 100% { opacity: 1;   box-shadow: 0 0 0 0   rgba(76,202,106,0.6); }
  50%       { opacity: 0.8; box-shadow: 0 0 0 6px rgba(76,202,106,0);   }
}

/* Number */
#count {
  font-size: 36px;
  font-weight: 900;
  color: #f5c842;
  line-height: 1;
  letter-spacing: -0.03em;
  transition: color 0.4s ease;
  text-shadow:
    0 0 12px rgba(0,0,0,0.9),
    0 2px 6px rgba(0,0,0,0.8),
    -1px -1px 0 rgba(0,0,0,0.5),
     1px  1px 0 rgba(0,0,0,0.5);
}
#count.bump {
  animation: count-bump 0.3s ease;
}
@keyframes count-bump {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.25); }
  100% { transform: scale(1); }
}
#count.offline { color: rgba(255,255,255,0.25); }

/* Label text */
#label {
  line-height: 1.3;
  text-shadow:
    0 1px 8px rgba(0,0,0,0.95),
    -1px -1px 0 rgba(0,0,0,0.6),
     1px  1px 0 rgba(0,0,0,0.6);
}
#label-top {
  font-size: 15px;
  font-weight: 800;
  color: rgba(255,255,255,0.9);
  white-space: nowrap;
}
#label-sub {
  font-size: 11px;
  font-weight: 700;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  white-space: nowrap;
}
</style>
</head>
<body>

<div id="widget">
  <div id="live-dot"></div>
  <div id="count">—</div>
  <div id="label">
    <div id="label-top">of The Herd</div>
    <div id="label-sub">streaming live</div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js';
import { getFirestore, collection, query, where, onSnapshot }
  from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:            "AIzaSyAfPwN5Yn9oCfn-WUeG1Emq7fDBh9dJq4Q",
  authDomain:        "capyrank-d8779.firebaseapp.com",
  projectId:         "capyrank-d8779",
  storageBucket:     "capyrank-d8779.firebasestorage.app",
  messagingSenderId: "1038634831025",
  appId:             "1:1038634831025:web:44801e37a6ac593b336690"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const countEl  = document.getElementById('count');
const dotEl    = document.getElementById('live-dot');
const widget   = document.getElementById('widget');

let prevCount = null;

const liveQuery = query(collection(db, 'streamers'), where('live', '==', true));

onSnapshot(liveQuery, (snap) => {
  const count = snap.size;

  // Bump animation on change (skip very first render)
  if (prevCount !== null && count !== prevCount) {
    countEl.classList.remove('bump');
    void countEl.offsetWidth; // reflow to restart animation
    countEl.classList.add('bump');
  }

  countEl.textContent = count.toLocaleString();
  prevCount = count;

  if (count === 0) {
    dotEl.classList.add('offline');
    countEl.classList.add('offline');
  } else {
    dotEl.classList.remove('offline');
    countEl.classList.remove('offline');
  }

  widget.classList.add('ready');
});
</script>
</body>
</html>
