<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapyRank Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: transparent;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: flex-end;
  justify-content: flex-start;
  padding: 32px;
  font-family: 'Nunito', sans-serif;
}

#alert {
  display: flex;
  align-items: center;
  gap: 14px;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.4s ease, transform 0.4s ease;
  pointer-events: none;
  max-width: 480px;
}

#alert.show {
  opacity: 1;
  transform: translateY(0);
}

#alert.hide {
  opacity: 0;
  transform: translateY(-10px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}

#alert-icon {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
  border: 2px solid #f5c842;
  background: #242220;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 900;
  color: #f5c842;
}
#alert-icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#alert-text {
  line-height: 1.35;
  text-shadow:
    0 0 8px rgba(0,0,0,0.9),
    0 2px 4px rgba(0,0,0,0.8),
    -1px -1px 0 rgba(0,0,0,0.6),
     1px -1px 0 rgba(0,0,0,0.6),
    -1px  1px 0 rgba(0,0,0,0.6),
     1px  1px 0 rgba(0,0,0,0.6);
}

#alert-top {
  font-size: 13px;
  font-weight: 700;
  color: rgba(255,255,255,0.7);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 2px;
}

#alert-main {
  font-size: 21px;
  font-weight: 900;
  color: #ffffff;
  letter-spacing: -0.01em;
}

#alert-main .yellow { color: #f5c842; }

@keyframes capy-bounce {
  0%   { transform: scale(1); }
  30%  { transform: scale(1.18); }
  60%  { transform: scale(0.94); }
  80%  { transform: scale(1.06); }
  100% { transform: scale(1); }
}
#alert.show #alert-icon {
  animation: capy-bounce 0.6s ease 0.2s both;
}
</style>
</head>
<body>

<div id="alert">
  <div id="alert-icon">
    <img id="alert-avatar" src="" alt="" style="display:none">
    <span id="alert-initial"></span>
  </div>
  <div id="alert-text">
    <div id="alert-top">🐾 capyrank.com</div>
    <div id="alert-main">
      <span class="yellow" id="alert-name"></span>
      gave <span class="yellow" id="alert-amount"></span>
      capy<span id="alert-plural"></span>!
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js';
import { getFirestore, collection, query, where, limit, getDocs, onSnapshot }
  from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:            "AIzaSyAfPwN5Yn9oCfn-WUeG1Emq7fDBh9dJq4Q",
  authDomain:        "capyrank-d8779.firebaseapp.com",
  projectId:         "capyrank-d8779",
  storageBucket:     "capyrank-d8779.firebasestorage.app",
  messagingSenderId: "1038634831025",
  appId:             "1:1038634831025:web:44801e37a6ac593b336690"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const params   = new URLSearchParams(window.location.search);
const username = (params.get('user') || '').toLowerCase().trim();

// ── Alert queue ──────────────────────────────────────────────
const queue   = [];
let   showing = false;

function enqueue(data) {
  queue.push(data);
  if (!showing) processQueue();
}

function processQueue() {
  if (!queue.length) { showing = false; return; }
  showing = true;
  showAlert(queue.shift());
}

function showAlert({ name, amount, avatarUrl }) {
  const el       = document.getElementById('alert');
  const img      = document.getElementById('alert-avatar');
  const initial  = document.getElementById('alert-initial');

  document.getElementById('alert-name').textContent   = name;
  document.getElementById('alert-amount').textContent = amount.toLocaleString();
  document.getElementById('alert-plural').textContent = amount === 1 ? '' : 's';

  if (avatarUrl) {
    img.src = avatarUrl;
    img.style.display = 'block';
    initial.style.display = 'none';
  } else {
    img.style.display = 'none';
    initial.textContent = name[0].toUpperCase();
    initial.style.display = 'block';
  }

  el.classList.remove('hide');
  el.classList.add('show');

  setTimeout(() => {
    el.classList.remove('show');
    el.classList.add('hide');
    setTimeout(() => {
      el.classList.remove('hide');
      processQueue();
    }, 600);
  }, 4500);
}

// ── Start listening ──────────────────────────────────────────
async function startListening() {
  if (!username) return;

  const q    = query(collection(db, 'streamers'), where('username', '==', username), limit(1));
  const snap = await getDocs(q);
  if (snap.empty) { console.warn('CapyRank overlay: streamer not found:', username); return; }

  const streamerId = snap.docs[0].id;
  let initialLoad  = true;
  const lastSeen   = {};

  const txQuery = query(
    collection(db, 'transactions'),
    where('to_streamer_id', '==', streamerId)
  );

  onSnapshot(txQuery, (txSnap) => {
    if (initialLoad) {
      txSnap.docs.forEach(d => {
        lastSeen[d.id] = d.data().given_today || 0;
      });
      initialLoad = false;
      return;
    }

    txSnap.docChanges().forEach(change => {
      if (change.type === 'added' || change.type === 'modified') {
        const data    = change.doc.data();
        const prev    = lastSeen[change.doc.id] || 0;
        const current = data.given_today || 0;
        const diff    = current - prev;

        if (diff > 0) {
          enqueue({
            name:      data.display_name || data.from_user || '?',
            amount:    diff,
            avatarUrl: data.avatar_url || '',
          });
        }

        lastSeen[change.doc.id] = current;
      }
    });
  });
}

startListening();
</script>
</body>
</html>
